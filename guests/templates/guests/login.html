{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Masuk · InviteEase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-500/20 border border-indigo-400/30 mb-4">
        <i class="fas fa-ticket-alt text-2xl text-indigo-300"></i>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">InviteEase</h1>
      <p class="text-indigo-200/70 text-sm mt-1">Masuk untuk akses desk &amp; dashboard</p>
    </div>

    <div class="bg-white/10 backdrop-blur-md rounded-2xl border border-white/10 p-8 shadow-2xl">
      {% if form.errors %}
      <div class="mb-4 p-3 rounded-xl bg-red-500/20 border border-red-400/30 text-red-100 text-sm">
        <i class="fas fa-exclamation-circle mr-2"></i>
        Username atau password salah.
      </div>
      {% endif %}

      <form method="post" action="{% url 'guests:login' %}" class="space-y-5">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next|default:'' }}">

        <div>
          <label class="block text-xs font-medium text-indigo-200/80 uppercase tracking-wider mb-2">Username</label>
          <input type="text" name="username" required autofocus autocomplete="username"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition"
            placeholder="username">
        </div>
        <div>
          <label class="block text-xs font-medium text-indigo-200/80 uppercase tracking-wider mb-2">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition"
            placeholder="••••••••">
        </div>

        <button type="submit"
          class="w-full py-3 rounded-xl bg-indigo-500 hover:bg-indigo-600 text-white font-semibold shadow-lg transition flex items-center justify-center gap-2">
          <i class="fas fa-sign-in-alt"></i> Masuk
        </button>
      </form>
    </div>
  </div>
</body>
</html>
